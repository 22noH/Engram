# v* 태그 푸시 시 3-OS 인스톨러를 빌드해 GitHub Release에 올린다(스펙 §6).
# macOS 인스톨러는 macOS에서만 빌드 가능해서 CI 매트릭스가 필수.
name: desktop-release

on:
  push:
    tags: ['v*']

# electron-builder가 릴리스를 생성/업로드하려면 contents 쓰기 권한 필요 —
# 기본 GITHUB_TOKEN은 read-only라 403(v0.0.7 첫 게시에서 실제 발생).
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 렌더러·콘솔은 별도 워크스페이스(자체 package.json) — 실사고(2026-07-24): 이 두 빌드가 빠져
      # CI 설치본에 화면 파일(renderer/dist·console/dist)이 없었고, 앱이 헬스 ok 후 로드 실패를
      # 무한 반복(영구 '시작 중'). 로컬 desktop:build와 동일 체인을 CI에도 강제한다.
      - run: npm ci --prefix renderer
      - run: npm ci --prefix console
      # 테스트는 Windows에서만(로컬 검증 환경과 동일 — mac/linux 테스트 호환은 비범위).
      - run: npm test
        if: runner.os == 'Windows'
      - run: npm run build
      - run: npm run renderer:build
      - run: npm run console:build
      # 패키징 전 가드: 화면 파일이 실제로 존재해야 한다(없으면 여기서 실패 — 깡통 설치본 원천 차단).
      - run: node -e "const fs=require('fs');for(const p of ['renderer/dist/index.html','console/dist/index.html']){if(!fs.existsSync(p)){console.error('missing '+p);process.exit(1)}}"
      - run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 무서명 배포(스펙 §6): mac 서명 자동탐색 끔.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
