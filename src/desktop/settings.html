<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Engram</title>
  <style>
    /* 라이트=화이트+하늘색, 다크=블랙+하늘색 — 채팅 창과 동일 팔레트(시스템 설정 자동 추종) */
    :root {
      --bg: #f2f7fb;
      --panel: #ffffff;
      --panel-2: #eaf1f8;
      --line: #dce6f0;
      --text: #1c2733;
      --muted: #5c6b7a;
      --accent: #3aa5de;       /* the single accent — sky */
      --accent-text: #ffffff;
      --log-bg: #eef5fa;
      --alive: #56d364;
      --dead: #f26d6d;
      --radius: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0e13;
        --panel: #12161d;
        --panel-2: #1a222c;
        --line: #222a35;
        --text: #e6edf3;
        --muted: #8b95a3;
        --accent: #7ec8e3;
        --accent-text: #0e1116;
        --log-bg: #0a0d11;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 14px/1.6 "Segoe UI Variable Text", "Segoe UI", "Malgun Gothic", sans-serif;
      padding: 28px 32px 40px;
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: "Cascadia Mono", Consolas, monospace; font-size: 12.5px; }

    header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 22px; }
    header h1 {
      margin: 0;
      font: 600 20px/1 "Segoe UI Variable Display", "Segoe UI", "Malgun Gothic", sans-serif;
      letter-spacing: 0.4px;
    }
    header .tagline { color: var(--muted); font-size: 12.5px; }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    section h2 {
      margin: 0 0 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 10px 0 0; }
    .hint { color: var(--muted); font-size: 12.5px; margin-top: 8px; }

    /* signature: the heartbeat pulse */
    .pulse-line { display: flex; align-items: center; gap: 12px; }
    .pulse { width: 12px; height: 12px; border-radius: 50%; background: var(--dead); flex: none; }
    .pulse.alive { background: var(--alive); animation: beat 2.4s ease-in-out infinite; }
    @keyframes beat {
      0%, 100% { box-shadow: 0 0 0 0 rgba(86, 211, 100, 0.45); }
      45%      { box-shadow: 0 0 0 9px rgba(86, 211, 100, 0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .pulse.alive { animation: none; box-shadow: 0 0 0 4px rgba(86, 211, 100, 0.25); }
    }
    .pulse-line strong { font-size: 15px; font-weight: 600; }
    .meta { color: var(--muted); font-size: 12.5px; margin-top: 8px; display: grid; gap: 3px; }
    .meta b { color: var(--text); font-weight: 500; }
    .warn-badge {
      display: none; margin-left: 8px; padding: 2px 8px; border-radius: 20px;
      background: #f26d6d22; color: var(--dead); font-size: 12px;
    }
    .warn-badge.show { display: inline-block; }

    button {
      font: inherit; font-size: 13px; cursor: pointer;
      border-radius: 8px; padding: 7px 14px;
      border: 1px solid var(--line);
      background: var(--panel-2); color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }
    button:hover { border-color: var(--accent); }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    button.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-text); font-weight: 600; }
    button.primary:hover { filter: brightness(1.08); }

    input, select {
      font: inherit; font-size: 13px;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--line); border-radius: 8px;
      padding: 7px 10px;
    }
    input:focus-visible, select:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
    input#token, input#apikey { width: 340px; font-family: "Cascadia Mono", Consolas, monospace; }

    .ok { color: var(--alive); }
    .bad { color: var(--dead); }
    code {
      font-family: "Cascadia Mono", Consolas, monospace; font-size: 12px;
      background: var(--bg); border: 1px solid var(--line);
      padding: 2px 7px; border-radius: 6px;
    }

    details { margin-top: 12px; }
    details summary { cursor: pointer; color: var(--muted); font-size: 12.5px; user-select: none; }
    details summary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    pre {
      background: var(--log-bg); border: 1px solid var(--line); border-radius: 8px;
      padding: 10px 12px; margin: 8px 0 0;
      max-height: 180px; overflow: auto;
      font-family: "Cascadia Mono", Consolas, monospace; font-size: 11.5px; line-height: 1.5;
      color: var(--muted); white-space: pre-wrap; word-break: break-all;
    }

    .saved { color: var(--alive); font-size: 12.5px; }
    @media (max-width: 560px) { body { padding: 18px; } input#token { width: 100%; } }
  </style>
</head>
<body>
  <header>
    <h1>Engram</h1>
    <span class="tagline" data-t="tagline"></span>
  </header>

  <section id="sec-status">
    <h2 data-t="secStatus"></h2>
    <div class="pulse-line">
      <span class="pulse" id="pulse"></span>
      <strong id="status-text"></strong>
      <span class="warn-badge" id="warn-badge"></span>
    </div>
    <div class="meta">
      <span><span data-t="lastBeat"></span> · <b id="beat">—</b></span>
      <span><span data-t="embedModel"></span> · <b id="model">—</b></span>
      <span><span data-t="dataFolder"></span> · <b id="datadir" class="mono">—</b></span>
    </div>
    <div class="row">
      <button class="primary" id="btn-restart" data-t="restart"></button>
      <button id="btn-refresh" data-t="refresh"></button>
    </div>
    <details>
      <summary data-t="showLogs"></summary>
      <pre id="log"></pre>
    </details>
  </section>

  <section id="sec-brain">
    <h2 data-t="secBrain"></h2>
    <div id="claude"></div>
    <div class="row" id="claude-install" hidden>
      <code id="install-cmd"></code>
      <button id="btn-copy-install" data-t="copyCmd"></button>
    </div>
    <div id="ollama" style="margin-top:10px"></div>
    <div class="row" id="ollama-add" hidden>
      <select id="ollama-model"></select>
      <label style="font-size:13px"><input type="checkbox" id="ollama-default" /> <span data-t="setDefault"></span></label>
      <button class="primary" id="btn-ollama" data-t="addBrain"></button>
    </div>
    <div class="row" id="api-add" style="margin-top:14px">
      <input id="apikey" type="password" placeholder="sk-ant-…" />
      <label style="font-size:13px"><input type="checkbox" id="api-default" /> <span data-t="setDefault"></span></label>
      <button class="primary" id="btn-apikey" data-t="saveKey"></button>
    </div>
    <div class="row" id="default-brain-row" style="margin-top:14px" hidden>
      <label style="font-size:13px" data-t="defaultBrain"></label>
      <select id="default-brain"></select>
    </div>
    <div id="api-note" style="font-size:12px;margin-top:4px;opacity:.75"></div>
  </section>

  <section id="sec-coding">
    <h2 data-t="secCoding"></h2>
    <div class="row">
      <label style="font-size:13px" data-t="cmdMode"></label>
      <select id="cmd-mode">
        <option value="auto" data-t="cmdAuto"></option>
        <option value="allowlist" data-t="cmdAllow"></option>
        <option value="off" data-t="cmdOff"></option>
      </select>
    </div>
    <div class="hint" data-t="cmdHint"></div>
  </section>

  <section id="sec-messenger">
    <h2>Discord</h2>
    <div class="row">
      <input id="token" type="password" />
      <button class="primary" id="btn-token" data-t="save"></button>
      <span class="saved" id="token-saved"></span>
    </div>
    <div class="hint" id="discord-hint"></div>
  </section>

  <section id="sec-advanced">
    <h2 data-t="secAdvanced"></h2>
    <div class="row">
      <button data-open="data" data-t="openData"></button>
      <button data-open="logs" data-t="openLogs"></button>
      <button data-open="config" data-t="openConfig"></button>
    </div>
    <div class="hint" data-t="advancedHint"></div>
  </section>

  <script>
    const $ = (id) => document.getElementById(id);

    // 영어 기본, 시스템 언어가 한국어면 한국어 (메인 프로세스 트레이 메뉴와 같은 판정).
    const KO = navigator.language.toLowerCase().startsWith('ko');
    const t = KO ? {
      tagline: '기억을 가진 팀 동료',
      secStatus: '상태', secBrain: '두뇌', secAdvanced: '고급',
      checking: '확인 중…', running: '정상 동작 중', notResponding: '응답 없음', restarting: '재시작 중…',
      warnBadge: '재시작이 계속 실패하고 있어요 — 로그를 확인하세요',
      lastBeat: '마지막 생존 신호', embedModel: '임베딩 모델', dataFolder: '데이터 위치',
      beatNone: '아직 없음 — 시작 직후에는 잠시 뒤 표시돼요',
      modelReady: '준비됨', modelPending: '미준비 — 첫 질문 때 자동으로 내려받아요',
      restart: '재시작', refresh: '새로고침', showLogs: '최근 로그 보기', logEmpty: '(로그 없음)',
      claudeOk: 'claude CLI 감지됨', claudeSignIn: '로그인은 터미널에서 claude 실행',
      claudeMissing: 'claude CLI를 찾을 수 없어요 — 아래 명령으로 설치하세요', copyCmd: '명령 복사', copied: '복사됨',
      ollamaOk: 'Ollama 실행 중', models: '개 모델',
      ollamaMissing: 'Ollama가 실행 중이 아니에요 — 로컬 LLM을 쓰려면 ollama.com에서 설치하세요',
      setDefault: '기본 두뇌로 사용', addBrain: '로컬 두뇌 추가', added: '추가됨 — 재시작하면 적용돼요',
      saveKey: '저장',
      apiKeyNote: 'Anthropic API 키 — claude CLI 없이 두뇌를 씁니다. 엔그램 하네스 두뇌도 코딩(파일 편집·명령 실행)이 됩니다. 코딩을 claude CLI가 할지 엔그램이 할지는 아래 "기본 두뇌"로 정해요.',
      apiKeySaved: '저장됨 — 재시작 후 적용',
      apiKeyError: '저장 실패 — 로그를 확인하세요',
      save: '저장', saved: '저장됨 — 재시작하면 적용돼요', tokenPlaceholder: '봇 토큰 붙여넣기',
      discordHint: '봇이 아직 없다면 discord.com/developers/applications 에서 만들고 Bot 탭에서 토큰을 발급하세요. 저장한 뒤 "재시작"을 누르면 연결돼요.',
      openData: '데이터 폴더', openLogs: '로그 폴더', openConfig: '설정 폴더',
      advancedHint: '설정 폴더의 JSON 파일(brains · channels · coderepos · schedules)을 직접 고친 뒤에는 "재시작"으로 적용하세요.',
      defaultBrain: '기본 두뇌', harnessCli: 'CLI 하네스', harnessEngram: '엔그램 하네스',
      secCoding: '코딩', cmdMode: '명령 실행', cmdAuto: '자동', cmdAllow: '제한', cmdOff: '끔',
      cmdHint: '자동 = 아무 명령이나 실행(클로드코드처럼). 제한 = 승인 목록만. 끔 = 파일만, 명령 없음.',
    } : {
      tagline: 'A teammate with memory',
      secStatus: 'Status', secBrain: 'Brain', secAdvanced: 'Advanced',
      checking: 'Checking…', running: 'Running', notResponding: 'Not responding', restarting: 'Restarting…',
      warnBadge: 'Restarts keep failing — check the logs',
      lastBeat: 'Last heartbeat', embedModel: 'Embedding model', dataFolder: 'Data folder',
      beatNone: 'none yet — appears shortly after startup',
      modelReady: 'Ready', modelPending: 'Not yet — downloads on your first question',
      restart: 'Restart', refresh: 'Refresh', showLogs: 'Show recent logs', logEmpty: '(no logs)',
      claudeOk: 'claude CLI detected', claudeSignIn: 'sign in by running claude in a terminal',
      claudeMissing: 'claude CLI not found — install it with the command below', copyCmd: 'Copy command', copied: 'Copied',
      ollamaOk: 'Ollama running', models: ' models',
      ollamaMissing: 'Ollama is not running — install it from ollama.com to use a local LLM',
      setDefault: 'Use as default brain', addBrain: 'Add local brain', added: 'Added — restart to apply',
      saveKey: 'Save',
      apiKeyNote: 'Anthropic API key — runs the brain without the claude CLI. Engram-harness brains can code too (file edits and commands). Whether the claude CLI or Engram does the coding is set by "Default brain" below.',
      apiKeySaved: 'Saved — restart to apply',
      apiKeyError: 'Save failed — check the logs',
      save: 'Save', saved: 'Saved — restart to apply', tokenPlaceholder: 'Paste bot token',
      discordHint: 'No bot yet? Create one at discord.com/developers/applications and issue a token in the Bot tab. After saving, click Restart to connect.',
      openData: 'Data folder', openLogs: 'Log folder', openConfig: 'Config folder',
      advancedHint: 'If you edit the JSON files (brains · channels · coderepos · schedules) directly, click Restart to apply.',
      defaultBrain: 'Default brain', harnessCli: 'CLI harness', harnessEngram: 'Engram harness',
      secCoding: 'Coding', cmdMode: 'Command execution', cmdAuto: 'Auto', cmdAllow: 'Restricted', cmdOff: 'Off',
      cmdHint: 'Auto = run any command (like Claude Code). Restricted = allowlist only. Off = files only, no commands.',
    };

    document.documentElement.lang = KO ? 'ko' : 'en';
    document.querySelectorAll('[data-t]').forEach((el) => { el.textContent = t[el.dataset.t]; });
    $('token').placeholder = t.tokenPlaceholder;
    $('discord-hint').textContent = t.discordHint;
    $('status-text').textContent = t.checking;
    $('log').textContent = t.logEmpty;
    $('claude').textContent = t.checking;
    $('ollama').textContent = t.checking;
    $('api-note').textContent = t.apiKeyNote;
    $('btn-apikey').onclick = async () => {
      const k = $('apikey').value.trim();
      if (!k) return;
      try {
        await window.engram.saveApiKey(k, $('api-default').checked);
        $('api-note').textContent = t.apiKeySaved;
        $('apikey').value = '';
      } catch (e) {
        $('api-note').textContent = t.apiKeyError;
      }
    };

    // 외부 유래 문자열(명령 stdout·API 응답)은 전부 textContent로만 — innerHTML 주입 금지.
    function setLine(el, parts) {
      el.textContent = '';
      for (const p of parts) {
        if (typeof p === 'string') { el.appendChild(document.createTextNode(p)); continue; }
        const span = document.createElement(p.tag || 'span');
        if (p.cls) span.className = p.cls;
        span.textContent = p.text;
        el.appendChild(span);
      }
    }

    async function refresh() {
      const s = await window.engram.status();
      $('pulse').classList.toggle('alive', s.alive);
      $('status-text').textContent = s.alive ? t.running : t.notResponding;
      $('warn-badge').textContent = t.warnBadge;
      $('warn-badge').classList.toggle('show', !!s.warn);
      $('beat').textContent = s.lastBeat ? new Date(s.lastBeat).toLocaleString() : t.beatNone;
      $('model').textContent = s.modelCacheReady ? t.modelReady : t.modelPending;
      $('datadir').textContent = s.dataDir;
      const log = await window.engram.logTail();
      $('log').textContent = log || t.logEmpty;
    }

    async function detect() {
      const c = await window.engram.detectClaude();
      if (c.installed) {
        setLine($('claude'), [
          { cls: 'ok', text: t.claudeOk },
          ' · ' + (c.version || '') + ' · ' + t.claudeSignIn,
        ]);
        $('claude-install').hidden = true;
      } else {
        setLine($('claude'), [{ cls: 'bad', text: t.claudeMissing }]);
        $('install-cmd').textContent = c.installCommand;
        $('claude-install').hidden = false;
        $('btn-copy-install').onclick = async () => {
          await navigator.clipboard.writeText(c.installCommand);
          $('btn-copy-install').textContent = t.copied;
        };
      }

      const o = await window.engram.detectOllama();
      if (o.running) {
        setLine($('ollama'), [
          { cls: 'ok', text: t.ollamaOk },
          ` · ${o.models.length}${t.models}`,
        ]);
        const sel = $('ollama-model');
        sel.textContent = '';
        for (const m of o.models) {
          const opt = document.createElement('option');
          opt.textContent = m;
          sel.appendChild(opt);
        }
        $('ollama-add').hidden = o.models.length === 0;
      } else {
        setLine($('ollama'), [t.ollamaMissing]);
        $('ollama-add').hidden = true;
      }
    }

    $('btn-restart').onclick = async () => {
      await window.engram.restart();
      $('status-text').textContent = t.restarting;
      setTimeout(refresh, 2000);
    };
    $('btn-refresh').onclick = refresh;
    $('btn-ollama').onclick = async () => {
      await window.engram.addOllama($('ollama-model').value, $('ollama-default').checked);
      setLine($('ollama'), [{ cls: 'ok', text: t.added }]);
    };
    $('btn-token').onclick = async () => {
      const v = $('token').value.trim();
      if (!v) return;
      await window.engram.saveToken(v);
      $('token-saved').textContent = t.saved;
    };
    document.querySelectorAll('[data-open]').forEach((b) => {
      b.onclick = () => window.engram.openPath(b.dataset.open);
    });

    async function loadBrains() {
      const brains = await window.engram.listBrains();
      const sel = $('default-brain');
      sel.textContent = '';
      const cli = brains.filter((b) => !/^(anthropic|openai)-api$/.test(b.provider));
      const engram = brains.filter((b) => /^(anthropic|openai)-api$/.test(b.provider));
      const addGroup = (label, items) => {
        if (!items.length) return;
        const og = document.createElement('optgroup');
        og.label = label;
        for (const b of items) {
          const opt = document.createElement('option');
          opt.value = b.key;
          opt.textContent = b.model ? `${b.key} · ${b.model}` : b.key;
          if (b.isDefault) opt.selected = true;
          og.appendChild(opt);
        }
        sel.appendChild(og);
      };
      addGroup(t.harnessCli, cli);
      addGroup(t.harnessEngram, engram);
      $('default-brain-row').hidden = brains.length === 0;
    }
    $('default-brain').onchange = async () => { await window.engram.setDefaultBrain($('default-brain').value); };

    async function loadCmdMode() { $('cmd-mode').value = await window.engram.getCommandMode(); }
    $('cmd-mode').onchange = async () => { await window.engram.setCommandMode($('cmd-mode').value); };

    loadBrains();
    loadCmdMode();

    refresh();
    detect();
    setInterval(refresh, 15000);
  </script>
</body>
</html>
