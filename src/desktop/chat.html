<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Engram</title>
<style>
  /* 테마: 라이트=화이트+하늘색, 다크=블랙+하늘색 — 시스템 설정(prefers-color-scheme) 자동 추종 */
  :root {
    --bg:#f2f7fb; --panel:#ffffff; --line:#dce6f0; --text:#1c2733; --dim:#5c6b7a;
    --accent:#3aa5de; --accent-soft:rgba(58,165,222,.12); --accent-line:rgba(58,165,222,.4);
    --accent-text:#ffffff; --hover:rgba(28,39,51,.05); --code-bg:#eaf3fa; --pre-bg:#eef5fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0b0e13; --panel:#12161d; --line:#222a35; --text:#e6edf3; --dim:#8b95a3;
      --accent:#7ec8e3; --accent-soft:rgba(126,200,227,.13); --accent-line:rgba(126,200,227,.4);
      --accent-text:#0e1116; --hover:rgba(255,255,255,.05); --code-bg:rgba(255,255,255,.07); --pre-bg:#0b0e13;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body { display:flex; flex-direction:column; height:100vh; background:var(--bg); color:var(--text);
         font-family:system-ui,-apple-system,'Segoe UI',sans-serif; font-size:14px; }
  /* 커스텀 타이틀바 — 드래그 영역(창 버튼은 OS 오버레이가 우측에 얹힘) */
  #titlebar { height:36px; flex:none; display:flex; align-items:center; gap:8px; padding:0 14px;
              background:var(--panel); border-bottom:1px solid var(--line);
              -webkit-app-region:drag; user-select:none; }
  #tbtitle { font-size:12.5px; font-weight:600; color:var(--accent); letter-spacing:.4px; }
  #app { flex:1; display:flex; min-height:0; }
  #side { width:220px; background:var(--panel); border-right:1px solid var(--line);
          display:flex; flex-direction:column; }
  #dot { width:8px; height:8px; border-radius:50%; background:#f26d6d; }
  #dot.on { background:#56d364; }
  #channels { flex:1; overflow-y:auto; }
  .ch { padding:8px 16px; cursor:pointer; color:var(--dim); display:flex; justify-content:space-between; }
  .ch:hover { background:var(--hover); }
  .ch.sel { color:var(--text); background:var(--accent-soft); border-right:2px solid var(--accent); }
  .ch .menu { visibility:hidden; }
  .ch:hover .menu { visibility:visible; }
  #newch { padding:10px 16px; color:var(--dim); cursor:pointer; border-top:1px solid var(--line); }
  #newch input { width:100%; padding:6px 8px; font-size:13px; }
  #main { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }
  #palette { display:none; position:absolute; bottom:64px; left:16px; right:16px; z-index:9;
             background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:4px;
             box-shadow:0 8px 24px rgba(0,0,0,.4); max-height:40vh; overflow-y:auto; }
  #palette .item { display:flex; gap:10px; align-items:baseline; padding:7px 10px; border-radius:6px; cursor:pointer; }
  #palette .item:hover, #palette .item.sel { background:var(--accent-soft); }
  #palette .cmd { color:var(--accent); font-family:Consolas,'Courier New',monospace; font-size:12.5px; white-space:nowrap; }
  #palette .desc { color:var(--dim); font-size:12.5px; }
  #msgs { flex:1; overflow-y:auto; padding:16px; }
  .msg { margin-bottom:10px; max-width:80%; }
  .msg .who { font-size:11px; color:var(--dim); margin-bottom:2px; }
  .msg .body { background:var(--panel); border:1px solid var(--line); border-radius:8px;
               padding:8px 12px; white-space:pre-wrap; word-break:break-word; }
  .body code { background:var(--code-bg); border:1px solid var(--line); border-radius:4px;
               padding:1px 5px; font-family:Consolas,'Courier New',monospace; font-size:12.5px; }
  .body pre { background:var(--pre-bg); border:1px solid var(--line); border-radius:8px;
              padding:10px 12px; overflow-x:auto; margin:6px 0; white-space:pre; }
  .body pre code { background:none; border:0; padding:0; font-size:12.5px; }
  .body ul, .body ol { margin:4px 0 4px 20px; padding:0; white-space:normal; }
  .body li { margin:2px 0; }
  .body ol li.pick { cursor:pointer; }
  .body ol li.pick:hover { color:var(--accent); }
  .body a { color:var(--accent); }
  .body .mdh { font-weight:700; margin:8px 0 4px; }
  .chart { margin:8px 0; background:var(--pre-bg); border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
  .chart .ctitle { font-size:12.5px; font-weight:600; color:var(--text); margin-bottom:4px; }
  .chart svg { width:100%; height:auto; display:block; }
  .chart .cbar { fill:var(--accent); }
  .chart .cline { fill:none; stroke:var(--accent); stroke-width:2; }
  .chart .cdot { fill:var(--accent); }
  .chart .clbl { fill:var(--dim); font-size:11px; }
  .chart .cval { fill:var(--text); font-size:10.5px; }
  .chart .cgrid { stroke:var(--line); stroke-width:1; }
  .msg.me { margin-left:auto; }
  .msg.me .body { background:var(--accent-soft); border-color:var(--accent-line); }
  .msg.reply { margin-left:18px; padding-left:12px; border-left:2px solid var(--accent-line); }
  .typing { color:var(--dim); font-size:12.5px; margin:2px 0 10px 4px; }
  .typing .dots::after { content:'…'; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity:.25; } 50% { opacity:1; } }
  details.thread { margin:-4px 0 10px 16px; }
  details.thread summary { color:var(--accent); font-size:12px; cursor:pointer; }
  details.thread .msg { max-width:100%; }
  .treply { display:flex; gap:6px; margin-top:6px; }
  #popmenu { position:fixed; background:var(--panel); border:1px solid var(--line); border-radius:8px;
             min-width:200px; padding:4px; z-index:10; box-shadow:0 8px 24px rgba(0,0,0,.4); }
  #popmenu div { padding:8px 12px; border-radius:6px; cursor:pointer; color:var(--text); font-size:13px; }
  #popmenu div:hover { background:var(--hover); }
  #popmenu div.danger { color:#f26d6d; }
  #inputbar { display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--line); }
  input[type=text] { flex:1; background:var(--panel); border:1px solid var(--line); border-radius:8px;
                     padding:10px 12px; color:var(--text); outline:none; }
  input[type=text]:focus { border-color:var(--accent); }
  button { background:var(--accent); border:0; border-radius:8px; padding:0 16px; cursor:pointer;
           color:var(--accent-text); font-weight:600; }
</style>
</head>
<body>
<div id="titlebar"><span id="dot"></span><span id="tbtitle">Engram</span></div>
<div id="app">
<div id="side">
  <div id="channels"></div>
  <div id="newch"></div>
</div>
<div id="main">
  <div id="msgs"></div>
  <div id="palette"></div>
  <div id="inputbar">
    <input id="input" type="text">
    <button id="send"></button>
  </div>
</div>
</div>
<script>
'use strict';
// ---- i18n (영어 기본, ko 로케일 한국어 — 설정창 관례) ----
const ko = navigator.language.toLowerCase().startsWith('ko');
const T = {
  placeholder: ko ? '메시지 입력…' : 'Message…',
  send: ko ? '보내기' : 'Send',
  newChannel: ko ? '+ 새 채널' : '+ New channel',
  newChannelPrompt: ko ? '채널 이름:' : 'Channel name:',
  replies: (n) => (ko ? `답글 ${n}개` : `${n} replies`),
  replyPh: ko ? '스레드에 답장…' : 'Reply in thread…',
  delConfirm: (name) => (ko ? `'${name}' 채널을 삭제할까요? (기록 파일은 남습니다)` : `Delete channel '${name}'? (history file is kept)`),
  delChannel: ko ? '채널 삭제' : 'Delete channel',
  modeAll: ko ? '모든 메시지에 반응' : 'Respond to all',
  modeMention: ko ? '@Engram 멘션에만 반응' : 'Respond to @Engram only',
  engram: 'Engram', me: ko ? '나' : 'me',
  thinking: ko ? 'Engram이 생각하는 중' : 'Engram is thinking',
};
document.getElementById('input').placeholder = T.placeholder;
document.getElementById('send').textContent = T.send;
document.getElementById('newch').textContent = T.newChannel;

// ---- 상태 ----
let ws = null;
let channels = [];
let current = null;                 // 선택된 channelId
const msgsByCh = new Map();         // channelId -> ChatMessage[]
const collapsedThreads = new Set(); // 사용자가 직접 접은 스레드만 기억(기본은 펼침 — 답이 내 글 밑에 바로 보이게)
const drafts = new Map();           // anchorId -> 스레드 답장 초안(진행 보고 재렌더에도 유지)
const awaiting = new Map();         // channelId -> 타임아웃 id — 답 기다리는 중("생각 중" 표시)

// 답이 올 것으로 기대되는 전송 뒤 "생각 중" 표시. 멘션-전용 채널에서 비멘션이면 안 띄움.
function expectReply(channelId, text) {
  const ch = channels.find((c) => c.id === channelId);
  if (ch && ch.respondMode === 'mention' && !/@engram/i.test(text)) return;
  clearTimeout(awaiting.get(channelId));
  awaiting.set(channelId, setTimeout(() => { awaiting.delete(channelId); if (channelId === current) renderMsgs(); }, 180000));
  if (channelId === current) renderMsgs();
}
function replyArrived(channelId) {
  if (!awaiting.has(channelId)) return;
  clearTimeout(awaiting.get(channelId));
  awaiting.delete(channelId);
}

// ---- ws 연결(재연결 백오프 1s→5s→30s) ----
const delays = [1000, 5000, 30000];
let attempt = 0;
function connect() {
  ws = new WebSocket(`ws://${location.host}`);
  ws.onopen = () => {
    attempt = 0;
    document.getElementById('dot').classList.add('on');
    document.getElementById('dot').title = ''; // 재연결 성공 시 이전 에러 툴팁 제거
    msgsByCh.clear(); // 재연결 시 파일 진실원과 재동기화(끊긴 동안의 메시지 놓침 방지)
    ws.send(JSON.stringify({ t: 'channels' }));
    if (current) ws.send(JSON.stringify({ t: 'history', channelId: current }));
  };
  ws.onclose = () => {
    document.getElementById('dot').classList.remove('on');
    const d = delays[Math.min(attempt++, delays.length - 1)];
    setTimeout(connect, d);
  };
  ws.onerror = () => {
    console.warn('WebSocket error');
  };
  ws.onmessage = (ev) => {
    let f; try { f = JSON.parse(ev.data); } catch { return; }
    if (f.t === 'channels') {
      channels = f.list;
      if (!current || !channels.some((c) => c.id === current)) selectChannel(channels[0] && channels[0].id);
      renderChannels();
    } else if (f.t === 'history') {
      msgsByCh.set(f.channelId, f.messages);
      if (f.channelId === current) renderMsgs();
    } else if (f.t === 'msg') {
      const arr = msgsByCh.get(f.channelId) || [];
      arr.push(f.message);
      msgsByCh.set(f.channelId, arr);
      if (f.message.authorId === 'engram') replyArrived(f.channelId); // 답 도착 → 생각 중 해제
      if (f.channelId === current) renderMsgs();
    } else if (f.t === 'error') {
      console.warn('server error:', f.text);
      document.getElementById('dot').title = f.text;
    }
  };
}

function selectChannel(id) {
  if (!id) return;
  current = id;
  if (!msgsByCh.has(id) && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ t: 'history', channelId: id }));
  }
  renderChannels();
  renderMsgs();
}

// ---- 렌더(외부 문자열은 전부 textContent) ----
function renderChannels() {
  const box = document.getElementById('channels');
  box.replaceChildren();
  for (const c of channels) {
    const div = document.createElement('div');
    div.className = 'ch' + (c.id === current ? ' sel' : '');
    const name = document.createElement('span');
    name.textContent = '# ' + c.name;
    div.appendChild(name);
    const menu = document.createElement('span');
    menu.className = 'menu';
    menu.textContent = '⋯';
    menu.onclick = (e) => { e.stopPropagation(); channelMenu(c, menu); };
    div.appendChild(menu);
    div.onclick = () => selectChannel(c.id);
    box.appendChild(div);
  }
}

// ---- 채널 컨텍스트 메뉴(⋯): 모드 전환 + 삭제. 바깥 클릭/Esc로 닫힘, 삭제만 confirm 한 번. ----
let popmenu = null;
function closeMenu() { if (popmenu) { popmenu.remove(); popmenu = null; } }
document.addEventListener('click', closeMenu);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMenu(); });

function channelMenu(c, anchorEl) {
  closeMenu();
  popmenu = document.createElement('div');
  popmenu.id = 'popmenu';
  const toggle = c.respondMode === 'all' ? 'mention' : 'all';
  const mode = document.createElement('div');
  mode.textContent = toggle === 'all' ? T.modeAll : T.modeMention; // 클릭하면 이 모드로 전환
  mode.onclick = () => {
    ws.send(JSON.stringify({ t: 'setRespondMode', id: c.id, mode: toggle }));
    closeMenu();
  };
  const del = document.createElement('div');
  del.className = 'danger';
  del.textContent = T.delChannel;
  del.onclick = () => {
    closeMenu();
    if (window.confirm(T.delConfirm(c.name))) {
      ws.send(JSON.stringify({ t: 'deleteChannel', id: c.id }));
    }
  };
  popmenu.appendChild(mode);
  popmenu.appendChild(del);
  document.body.appendChild(popmenu);
  const r = anchorEl.getBoundingClientRect();
  popmenu.style.left = Math.max(8, Math.min(r.left, window.innerWidth - popmenu.offsetWidth - 8)) + 'px';
  popmenu.style.top = Math.min(r.bottom + 4, window.innerHeight - popmenu.offsetHeight - 8) + 'px';
}

// ---- 미니 마크다운 렌더러: innerHTML 없이 DOM 노드로만 조립(XSS 차단 유지) ----
// 지원: **굵게** *기울임* `코드` ```코드블록``` 목록(-/1.) 제목(#) 링크(http/https만).
function mdLink(url, label) {
  const a = document.createElement('a');
  a.href = url; // 정규식이 http/https만 매치 — javascript: 등 차단
  a.target = '_blank';
  a.rel = 'noreferrer';
  a.textContent = label;
  return a;
}
function mdInline(text) {
  const frag = document.createDocumentFragment();
  const re = /(`[^`\n]+`)|(\*\*[^*]+\*\*)|(\*[^*\n]+\*)|\[([^\]\n]+)\]\((https?:\/\/[^\s)]+)\)|(https?:\/\/[^\s<>()"']+)/g;
  let last = 0, m;
  while ((m = re.exec(text))) {
    if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
    if (m[1]) { const c = document.createElement('code'); c.textContent = m[1].slice(1, -1); frag.appendChild(c); }
    else if (m[2]) { const b = document.createElement('strong'); b.appendChild(mdInline(m[2].slice(2, -2))); frag.appendChild(b); }
    else if (m[3]) { const i = document.createElement('em'); i.appendChild(mdInline(m[3].slice(1, -1))); frag.appendChild(i); }
    else if (m[4]) { frag.appendChild(mdLink(m[5], m[4])); }
    else if (m[6]) { frag.appendChild(mdLink(m[6], m[6])); }
    last = re.lastIndex;
  }
  if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
  return frag;
}
// ---- 인라인 SVG 차트(외부 라이브러리 0). ```chart JSON 블록을 막대/선 그래프로. ----
// spec: {"type":"bar"|"line","title":"...","labels":[...],"values":[num,...],"unit":"%"}
const SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(name, attrs, text) {
  const e = document.createElementNS(SVG_NS, name);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (text != null) e.textContent = text; // 외부 문자열은 textContent로만
  return e;
}
function renderChart(jsonText) {
  let spec; try { spec = JSON.parse(jsonText); } catch { return null; }
  const labels = Array.isArray(spec.labels) ? spec.labels.map(String) : [];
  const values = Array.isArray(spec.values) ? spec.values.map(Number) : [];
  if (!values.length || values.some((v) => !isFinite(v)) || labels.length !== values.length) return null;
  const type = spec.type === 'line' ? 'line' : 'bar';
  const unit = typeof spec.unit === 'string' ? spec.unit : '';
  const W = 640, H = 260, padL = 44, padR = 16, padT = 16, padB = 34;
  const iw = W - padL - padR, ih = H - padT - padB;
  const lo = Math.min(0, ...values), hi = Math.max(0, ...values);
  const span = hi - lo || 1;
  const y = (v) => padT + ih - ((v - lo) / span) * ih;
  const wrap = document.createElement('div');
  wrap.className = 'chart';
  if (typeof spec.title === 'string' && spec.title) {
    const t = document.createElement('div'); t.className = 'ctitle'; t.textContent = spec.title; wrap.appendChild(t);
  }
  const svg = svgEl('svg', { viewBox: `0 0 ${W} ${H}`, preserveAspectRatio: 'xMidYMid meet' });
  // 0선/바닥 눈금
  svg.appendChild(svgEl('line', { class: 'cgrid', x1: padL, y1: y(0), x2: W - padR, y2: y(0) }));
  const n = values.length, slot = iw / n;
  values.forEach((v, i) => {
    const cx = padL + slot * (i + 0.5);
    if (type === 'bar') {
      const bw = Math.min(slot * 0.6, 48);
      const top = Math.min(y(v), y(0)), h = Math.abs(y(v) - y(0));
      svg.appendChild(svgEl('rect', { class: 'cbar', x: cx - bw / 2, y: top, width: bw, height: Math.max(1, h), rx: 3 }));
    }
    svg.appendChild(svgEl('text', { class: 'cval', x: cx, y: y(v) - 5, 'text-anchor': 'middle' }, String(v) + unit));
    svg.appendChild(svgEl('text', { class: 'clbl', x: cx, y: H - 12, 'text-anchor': 'middle' }, labels[i]));
  });
  if (type === 'line') {
    const pts = values.map((v, i) => `${padL + slot * (i + 0.5)},${y(v)}`).join(' ');
    svg.appendChild(svgEl('polyline', { class: 'cline', points: pts }));
    values.forEach((v, i) => svg.appendChild(svgEl('circle', { class: 'cdot', cx: padL + slot * (i + 0.5), cy: y(v), r: 3 })));
  }
  wrap.appendChild(svg);
  return wrap;
}
function renderMarkdown(text) {
  const root = document.createDocumentFragment();
  const segs = String(text).split('```'); // 짝수=본문, 홀수=코드블록
  segs.forEach((seg, idx) => {
    if (idx % 2 === 1) {
      const lang = (seg.match(/^([\w-]*)\n/) || [, ''])[1];
      const bodyText = seg.replace(/^[\w-]*\n/, '').replace(/\n$/, '');
      if (lang === 'chart') {
        const el = renderChart(bodyText);
        if (el) { root.appendChild(el); return; } // 파싱 실패면 아래 코드블록으로 폴백
      }
      const pre = document.createElement('pre');
      const code = document.createElement('code');
      code.textContent = bodyText;
      pre.appendChild(code);
      root.appendChild(pre);
      return;
    }
    let chunk = '';
    let list = null; // 진행 중인 ul/ol
    const flushChunk = () => {
      if (chunk) { root.appendChild(mdInline(chunk.replace(/\n+$/, '\n').replace(/^\n+/, ''))); chunk = ''; }
    };
    const flushList = () => { list = null; };
    for (const line of seg.split('\n')) {
      const h = line.match(/^(#{1,3})\s+(.*)/);
      const ul = line.match(/^\s*[-*]\s+(.*)/);
      const ol = line.match(/^\s*\d+[.)]\s+(.*)/);
      if (h) {
        flushChunk(); flushList();
        const d = document.createElement('div');
        d.className = 'mdh';
        d.appendChild(mdInline(h[2]));
        root.appendChild(d);
      } else if (ul || ol) {
        flushChunk();
        const tag = ul ? 'ul' : 'ol';
        if (!list || list.tagName.toLowerCase() !== tag) { list = document.createElement(tag); root.appendChild(list); }
        const li = document.createElement('li');
        li.appendChild(mdInline((ul || ol)[1]));
        list.appendChild(li);
      } else {
        flushList();
        chunk += line + '\n';
      }
    }
    flushChunk();
  });
  return root;
}

function makeMsgEl(m) {
  const div = document.createElement('div');
  div.className = 'msg' + (m.authorId !== 'engram' ? ' me' : '');
  const who = document.createElement('div');
  who.className = 'who';
  who.textContent = (m.authorId === 'engram' ? T.engram : T.me) + ' · ' + new Date(m.ts).toLocaleTimeString();
  const body = document.createElement('div');
  body.className = 'body';
  body.appendChild(renderMarkdown(m.text));
  // Engram의 번호 목록(후보 선택 등)은 클릭하면 그 번호가 입력창에 채워짐 — 전송은 Enter로 확정(오클릭 방지).
  if (m.authorId === 'engram') {
    body.querySelectorAll('ol').forEach((ol) => {
      ol.querySelectorAll(':scope > li').forEach((li, i) => {
        li.classList.add('pick');
        li.title = ko ? '클릭하면 번호가 입력됩니다' : 'Click to fill this number';
        li.onclick = () => {
          const inp = document.getElementById('input');
          inp.value = String(i + 1);
          inp.focus();
        };
      });
    });
  }
  div.appendChild(who);
  div.appendChild(body);
  return div;
}

function renderMsgs() {
  const box = document.getElementById('msgs');
  box.replaceChildren();
  const msgs = msgsByCh.get(current) || [];
  const replies = new Map(); // anchorId -> msgs
  for (const m of msgs) {
    if (m.threadId) {
      if (!replies.has(m.threadId)) replies.set(m.threadId, []);
      replies.get(m.threadId).push(m);
    }
  }
  for (const m of msgs) {
    if (m.threadId) continue; // 본류만 직접 렌더
    box.appendChild(makeMsgEl(m));
    const rs = replies.get(m.id) || [];
    if (rs.length === 1) {
      const el = makeMsgEl(rs[0]); // 답 1개 = 인라인 + 연결선(어느 질문의 답인지 표시)
      el.classList.add('reply');
      box.appendChild(el);
    } else if (rs.length >= 2) {
      const det = document.createElement('details');
      det.className = 'thread';
      det.open = !collapsedThreads.has(m.id); // 기본 펼침, 사용자가 접은 것만 접힌 채 유지
      det.ontoggle = () => { det.open ? collapsedThreads.delete(m.id) : collapsedThreads.add(m.id); };
      const sum = document.createElement('summary');
      sum.textContent = '🧵 ' + T.replies(rs.length);
      det.appendChild(sum);
      for (const r of rs) det.appendChild(makeMsgEl(r));
      const bar = document.createElement('div');
      bar.className = 'treply';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = T.replyPh;
      inp.value = drafts.get(m.id) || ''; // 진행 보고가 재렌더해도 입력 중이던 초안 유지
      inp.oninput = () => drafts.set(m.id, inp.value);
      inp.onkeydown = (e) => {
        if (e.key === 'Enter' && inp.value.trim()) {
          ws.send(JSON.stringify({ t: 'send', channelId: current, threadId: m.id, text: inp.value }));
          expectReply(current, inp.value);
          inp.value = '';
          drafts.delete(m.id);
        }
      };
      bar.appendChild(inp);
      det.appendChild(bar);
      box.appendChild(det);
    }
  }
  if (awaiting.has(current)) { // 답 대기 중 표시(도착하면 replyArrived가 지움)
    const t = document.createElement('div');
    t.className = 'typing';
    const label = document.createElement('span');
    label.textContent = T.thinking;
    const dots = document.createElement('span');
    dots.className = 'dots';
    t.appendChild(label);
    t.appendChild(dots);
    box.appendChild(t);
  }
  box.scrollTop = box.scrollHeight;
}

// ---- / 명령 팔레트: '/'로 시작하면 명령 목록 표시. 실제 명령엔 /가 없음('/'는 여는 열쇠일 뿐). ----
const COMMANDS = [
  { insert: '상태', label: '상태', desc: ko ? '이 채널의 진행 중/최근 작업 상태' : 'Running/recent tasks in this channel' },
  { insert: 'code ', label: 'code <repo> <goal>', desc: ko ? '레포에 코딩 위임 — 자연어("○○레포에 △△ 해줘")도 됨' : 'Delegate coding to a repo — natural language works too' },
  { insert: 'team ', label: 'team <p1,p2> <question>', desc: ko ? '지정한 페르소나 팀으로 협업' : 'Collaborate with the named persona team' },
  { insert: 'ask ', label: 'ask <question>', desc: ko ? '분류 없이 바로 위키 근거 답변' : 'Direct wiki-grounded answer (skips triage)' },
  { insert: 'schedule ', label: 'schedule <cron> <task>', desc: ko ? '예약 — 자연어("매일 9시에…")도 됨' : 'Schedule — natural language works too' },
  { insert: '예약목록', label: ko ? '예약목록' : '예약목록 (list schedules)', desc: ko ? '이 채널의 예약 보기' : 'List schedules in this channel' },
  { insert: '예약취소 ', label: ko ? '예약취소 <id>' : '예약취소 <id> (cancel)', desc: ko ? '예약 취소' : 'Cancel a schedule' },
  { insert: 'resume ', label: 'resume <projectId>', desc: ko ? '멈춘 코딩 작업 재개' : 'Resume a stopped coding project' },
];
let palItems = [];
let palIdx = 0;
function hidePalette() { document.getElementById('palette').style.display = 'none'; palItems = []; }
function renderPalette(filter) {
  const box = document.getElementById('palette');
  palItems = COMMANDS.filter((c) => c.label.toLowerCase().includes(filter) || c.insert.toLowerCase().includes(filter));
  if (palItems.length === 0) { hidePalette(); return; }
  palIdx = Math.min(palIdx, palItems.length - 1);
  box.replaceChildren();
  palItems.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'item' + (i === palIdx ? ' sel' : '');
    const cmd = document.createElement('span');
    cmd.className = 'cmd';
    cmd.textContent = c.label;
    const desc = document.createElement('span');
    desc.className = 'desc';
    desc.textContent = c.desc;
    item.appendChild(cmd);
    item.appendChild(desc);
    item.onclick = () => pickCommand(c);
    box.appendChild(item);
  });
  box.style.display = 'block';
}
function pickCommand(c) {
  const inp = document.getElementById('input');
  inp.value = c.insert;
  hidePalette();
  inp.focus();
}

// ---- 입력 ----
function sendMain() {
  const inp = document.getElementById('input');
  if (!inp.value.trim() || !current || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ t: 'send', channelId: current, text: inp.value }));
  expectReply(current, inp.value);
  inp.value = '';
  hidePalette();
}
document.getElementById('send').onclick = sendMain;
document.getElementById('input').oninput = () => {
  const v = document.getElementById('input').value;
  if (v.startsWith('/')) renderPalette(v.slice(1).toLowerCase());
  else hidePalette();
};
document.getElementById('input').onkeydown = (e) => {
  if (palItems.length > 0) { // 팔레트 열림: 방향키/Enter/Esc는 팔레트 조작
    if (e.key === 'ArrowDown') { e.preventDefault(); palIdx = (palIdx + 1) % palItems.length; renderPalette(document.getElementById('input').value.slice(1).toLowerCase()); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); palIdx = (palIdx - 1 + palItems.length) % palItems.length; renderPalette(document.getElementById('input').value.slice(1).toLowerCase()); return; }
    if (e.key === 'Enter') { e.preventDefault(); pickCommand(palItems[palIdx]); return; }
    if (e.key === 'Escape') { hidePalette(); return; }
  }
  if (e.key === 'Enter') sendMain();
};
// Electron은 window.prompt 미지원 — 그 자리 인라인 입력으로 채널 이름을 받는다.
document.getElementById('newch').onclick = () => {
  const box = document.getElementById('newch');
  if (box.querySelector('input')) return; // 이미 입력 중
  box.textContent = '';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.placeholder = T.newChannelPrompt;
  const done = () => { box.textContent = T.newChannel; };
  inp.onkeydown = (e) => {
    if (e.key === 'Enter' && inp.value.trim() && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ t: 'createChannel', name: inp.value }));
      done();
    } else if (e.key === 'Escape') {
      done();
    }
  };
  inp.onblur = done;
  box.appendChild(inp);
  inp.focus();
};

connect();
</script>
